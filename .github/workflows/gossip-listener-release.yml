name: CI/CD - gossip-listener

on:
  push:
    branches:
      - "master"
      - "develop"
    tags:
      - "v*"
  pull_request:
    branches:
      - "master"
      - "develop"

permissions:
  contents: write # Required for GitHub Releases
  packages: write # Required for pushing to GHCR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/gossip-listener

jobs:
  # ==========================================
  # JOB 1: Create GitHub Release (Tags Only)
  # ==========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only run this job if a tag starting with 'v' was pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub Release (if missing)
        run: |
          if gh release view "${{ github.ref_name }}" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists."
          else
            gh release create "${{ github.ref_name }}" -R "${{ github.repository }}" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # JOB 2: Build Binaries (Tags Only)
  # ==========================================
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: gossip-listener-${{ github.ref_name }}-linux-x86_64.tar.gz
            bin_path: target/x86_64-unknown-linux-gnu/release/gossip-listener
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: gossip-listener-${{ github.ref_name }}-linux-aarch64.tar.gz
            bin_path: target/aarch64-unknown-linux-gnu/release/gossip-listener
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: gossip-listener-${{ github.ref_name }}-linux-armv7.tar.gz
            bin_path: target/armv7-unknown-linux-gnueabihf/release/gossip-listener
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: gossip-listener-${{ github.ref_name }}-macos-x86_64.tar.gz
            bin_path: target/x86_64-apple-darwin/release/gossip-listener
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gossip-listener-${{ github.ref_name }}-macos-aarch64.tar.gz
            bin_path: target/aarch64-apple-darwin/release/gossip-listener
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gossip-listener-${{ github.ref_name }}-windows-x86_64.zip
            bin_path: target\x86_64-pc-windows-msvc\release\gossip-listener.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross compiler
        if: ${{ contains(matrix.target, 'linux-gnu') || contains(matrix.target, 'linux-gnueabihf') }}
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          elif [ "${{ matrix.target }}" = "armv7-unknown-linux-gnueabihf" ]; then
            sudo apt-get install -y gcc-arm-linux-gnueabihf
          fi

      - name: Build
        run: cargo build --release --manifest-path gossip-listener/Cargo.toml --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc

      - name: Package (tar.gz)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          mkdir -p dist
          cp "gossip-listener/${{ matrix.bin_path }}" dist/
          tar -czf "dist/${{ matrix.artifact_name }}" -C dist gossip-listener

      - name: Package (zip)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "gossip-listener\${{ matrix.bin_path }}" dist\gossip-listener.exe
          Compress-Archive -Path dist\gossip-listener.exe -DestinationPath "dist\${{ matrix.artifact_name }}"
        shell: pwsh

      - name: Upload release asset
        run: gh release upload "${{ github.ref_name }}" "dist/${{ matrix.artifact_name }}" --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          cd dist
          shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"

      - name: Generate checksums (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          $Path = "dist\${{ matrix.artifact_name }}"
          $Hash = (Get-FileHash -Algorithm SHA256 -Path $Path).Hash.ToLower()
          "$Hash  ${{ matrix.artifact_name }}" | Out-File -Encoding ascii -FilePath "dist\${{ matrix.artifact_name }}.sha256"
        shell: pwsh

      - name: Upload checksum asset
        run: gh release upload "${{ github.ref_name }}" "dist/${{ matrix.artifact_name }}.sha256" --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # JOB 3: Build & Push Docker Image
  # ==========================================
  build-and-push-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # This runs on tags, branches, and PRs, independently of the binaries jobs.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only log in if we are actually going to push (not on PRs)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gossip-listener
          # Added architectures matching the binary build matrix
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          # Only push to GHCR if this is a merge/push, NOT a pull request
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
